<div id="ai-output" style="color: #00FF00; font-family: monospace; padding: 20px; background: #000;">
    正在呼叫远端的 4070 Ti...
</div>

<script>
    // 这是你刚刚新鲜出炉的后端接口地址
    const backendApiUrl = "https://pupils-shipping-assets-manufacturer.trycloudflare.com/api/status";

    // 让网页自动去请求你的家里的电脑
    fetch(backendApiUrl)
        .then(response => {
            if (!response.ok) {
                throw new Error('隧道连接异常');
            }
            return response.json(); // 解析 Java 传回来的 JSON 数据
        })
        .then(data => {
            console.log("成功拿到本地算力数据：", data);
            
            // 提取出 Java 代码里写的那句 Hello
            const textToType = data.message; 
            
            // 把文字显示在网页上（这里可以替换成你原本炫酷的打字机特效函数）
            document.getElementById('ai-output').innerText = "来自算力中心的回应: " + textToType + "\n计算时间: " + data.time;
        })
        .catch(error => {
            console.error("请求失败:", error);
            document.getElementById('ai-output').innerText = "❌ 无法连接到本地算力节点，请检查 Java 后端和隧道是否在线。";
        });
</script>
