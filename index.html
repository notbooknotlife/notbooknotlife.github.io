<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZY | Workspace</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent-glow: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, "Noto Sans SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 背景微弱的渐变光晕 */
        .glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            z-index: -1;
        }

        .main-content {
            text-align: center;
            max-width: 500px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .item {
            background: var(--accent-glow);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .item:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .item-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 5px;
            display: block;
        }

        .item-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .full-width {
            grid-column: span 2;
        }

        .footer-links {
            margin-top: 20px;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        /* 极简呼吸灯 */
        .status {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #2ea043;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #2ea043;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="main-content">
        <h1>ZY.W</h1>
        <p class="tagline">Explore · Build · Repeat</p>

        <div class="grid">
            <div class="item">
                <span class="item-title">Location</span>
                <span class="item-value">Nanjing, CN</span>
            </div>
            <div class="item">
                <span class="item-title">Focus</span>
                <span class="item-value">AI & Dev</span>
            </div>
            <div class="item full-width">
                <span class="item-title">Local Node Status</span>
                <span class="item-value"><span class="status"></span>4070 Ti Hyper-V Active</span>
            </div>
            <div class="item full-width">
                <span class="item-title">Quote</span>
                <span class="item-value">"Everything is code."</span>
            </div>
        </div>

        <div class="footer-links">
            <a href="https://github.com/notbooknotlife">GitHub</a>
            <a href="mailto:your-email@example.com">Contact</a>
        </div>
    </div>

</body>
</html>
